version: "3.9"
services:
  api:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    volumes:
      - ./output:/app/output
      - ./secrets:/app/secrets
      - ./manim_templates:/app/manim_templates
    depends_on: [postgres, redis]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: ./backend
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    volumes:
      - ./output:/app/output
      - ./manim_templates:/app/manim_templates
    depends_on: [postgres, redis]
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

  flower:
    build: ./backend
    command: celery -A workers.celery_app flower --port=5555
    ports: ["5555:5555"]
    env_file: .env
    depends_on: [redis]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autodirector
      POSTGRES_USER: autodirector
      POSTGRES_PASSWORD: changeme
    volumes: [postgres_data:/var/lib/postgresql/data]
    ports: ["5433:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autodirector"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

volumes:
  postgres_data: