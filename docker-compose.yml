version: "3.9"
services:
  api:
    build: ./backend
    ports: ["8000:8000"]
    env_file: .env
    volumes:
      - ./output:/app/output
      - ./secrets:/app/secrets
      - ./manim_templates:/app/manim_templates
    depends_on: [postgres, redis]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: ./backend
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4
    env_file: .env
    volumes:
      - ./output:/app/output
      - ./manim_templates:/app/manim_templates
    depends_on: [postgres, redis]
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G

  flower:
    build: ./backend
    command: celery -A workers.celery_app flower --port=5555
    ports: ["5555:5555"]
    env_file: .env
    depends_on: [redis]

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: autodirector
      POSTGRES_USER: autodirector
      POSTGRES_PASSWORD: changeme
    volumes: [postgres_data:/var/lib/postgresql/data]
    ports: ["5433:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autodirector"]
      interval: 10s
      timeout: 5s
      retries: 5

  playwright:
    image: mcr.microsoft.com/playwright/python:v1.44.0-jammy
    profiles: ["playwright"]
    command: ["sleep", "infinity"]

  # ── Knowledge Graph ──────────────────────────────────────────────────────────
  memgraph:
    image: memgraph/memgraph-platform:latest
    container_name: graphalpha-memgraph
    ports:
      - "7687:7687"   # Bolt protocol (agents connect here)
      - "7444:7444"   # Memgraph Lab UI (dev only)
      - "3000:3000"   # Memgraph Lab web UI
    volumes:
      - memgraph_data:/var/lib/memgraph
      - memgraph_log:/var/log/memgraph
    environment:
      MEMGRAPH_TELEMETRY_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole --host localhost --port 7687"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G

  # ── Graph loader (runs once, then exits) ─────────────────────────────────────
  graph-loader:
    image: memgraph/mgconsole:latest
    container_name: graphalpha-loader
    depends_on:
      memgraph:
        condition: service_healthy
    volumes:
      - ./master.cypher:/graph/master.cypher:ro
    entrypoint: >
      sh -c "cat /graph/master.cypher | mgconsole
             --host 127.0.0.1 --port 7687 &&
             echo 'Graph loaded successfully'"
    restart: "no"

  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

volumes:
  postgres_data:
  memgraph_data:
  memgraph_log:
